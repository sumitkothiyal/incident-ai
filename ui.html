<!DOCTYPE html>
<html>
<head>
  <title>AI Incident Command Center</title>

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Arial;
      background: #202123;
      color: white;
      display: flex;
      height: 100vh;
    }

    /* Sidebar */
    #sidebar {
      width: 250px;
      background: #171717;
      padding: 15px;
      border-right: 1px solid #333;
    }

    #sidebar h2 {
      font-size: 16px;
      margin-bottom: 10px;
    }

    .history-item {
      background: #2a2b32;
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 8px;
      cursor: pointer;
      font-size: 13px;
    }

    .history-item:hover {
      background: #3a3b42;
    }

    /* Main */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 15px;
      border-bottom: 1px solid #333;
      background: #111;
    }

    /* Chat */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      max-width: 900px;
      margin: auto;
      width: 100%;
    }

    .bubble {
      margin: 10px 0;
      padding: 12px;
      border-radius: 10px;
    }

    .user {
      background: #2f3140;
      text-align: right;
    }

    .ai {
      background: #2a2b35;
    }

    /* Cards */
    .card {
      margin-top: 10px;
      padding: 12px;
      border-radius: 8px;
    }

    .support { border-left: 4px solid #4CAF50; }
    .analytics { border-left: 4px solid #2196F3; }
    .dev { border-left: 4px solid #FF9800; }

    pre {
      white-space: pre-wrap;
      font-size: 13px;
    }

    /* Input */
    #inputArea {
      display: flex;
      padding: 10px;
      background: #111;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 6px;
      border: none;
    }

    button {
      padding: 10px 20px;
      background: #19c37d;
      border: none;
      color: white;
      cursor: pointer;
      border-radius: 6px;
    }

    /* Severity */
    .severity {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 12px;
      margin-top: 5px;
    }

    .p1 { background: red; }
    .p2 { background: orange; }
    .p3 { background: green; }
  </style>
</head>

<body>

<!-- Sidebar -->
<div id="sidebar">
  <h2>📜 Incidents</h2>
  <div id="history"></div>
</div>

<!-- Main -->
<div id="main">

<header>🚨 AI Incident Command Center</header>

<div id="chat"></div>

<div id="inputArea">
  <input id="input" placeholder="Describe the incident..." />
  <button onclick="send()">Send</button>
</div>

</div>

<script>

let history = [];

function getSeverity(text) {
  if (text.toLowerCase().includes("down")) return "P1";
  if (text.toLowerCase().includes("slow")) return "P2";
  return "P3";
}

async function send() {
  const inputField = document.getElementById("input");
  const input = inputField.value.trim();
  if (!input) return;

  addUser(input);
  inputField.value = "";

  const severity = getSeverity(input);

  addAI("⏳ Analyzing...");

  try {
    const res = await fetch("https://incident-ai.onrender.com/ask", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ input })
    });

    const data = await res.json();

    document.querySelector("#chat").lastChild.remove();

    addResponse(data, severity);

    addToHistory(input, severity);

  } catch (err) {
    addAI("❌ Error: " + err.message);
  }
}

function addUser(text) {
  const div = document.createElement("div");
  div.className = "bubble user";
  div.innerText = text;
  chat.appendChild(div);
}

function addAI(text) {
  const div = document.createElement("div");
  div.className = "bubble ai";
  div.innerText = text;
  chat.appendChild(div);
}

function addResponse(data, severity) {
  const div = document.createElement("div");
  div.className = "bubble ai";

  div.innerHTML = `
    <b>🚨 Incident Analysis</b><br>
    <span class="severity ${severity.toLowerCase()}">${severity}</span>

    <div class="card support">
      <b>🧑‍💼 Support</b>
      <pre>${data.support}</pre>
    </div>

    <div class="card analytics">
      <b>📊 Analytics</b>
      <pre>${data.analytics}</pre>
    </div>

    <div class="card dev">
      <b>👨‍💻 Dev Action</b>
      <pre>${data.dev}</pre>
    </div>
  `;

  chat.appendChild(div);
  div.scrollIntoView();
}

function addToHistory(text, severity) {
  const item = document.createElement("div");
  item.className = "history-item";
  item.innerText = `${severity} - ${text}`;
  document.getElementById("history").appendChild(item);
}

</script>

</body>
</html>
